# Tag-triggered publishing to pub.dev via the official reusable workflow (OIDC).
#
# One-time pub.dev setup (package admin -> Automated publishing):
#   - Enable "Publishing from GitHub Actions" for omar-hanafy/docx_to_markdown
#   - Tag pattern: docx_to_markdown-v{{version}}
#
# Tags are created automatically by auto-release.yml on merge to main/dev.
name: Publish to pub.dev

on:
  push:
    tags:
      - 'docx_to_markdown-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    permissions:
      id-token: write # required for OIDC token minting
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
