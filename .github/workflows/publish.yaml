# Tag-triggered publishing to pub.dev via OIDC (no stored credentials).
#
# One-time setup on pub.dev (package admin -> Automated publishing):
#   1. Publish 0.0.1 manually once, or claim a verified publisher.
#   2. Enable "Automated publishing from GitHub Actions" for the repo
#      `omar-hanafy/docx_to_markdown` with tag pattern `v{{version}}`.
# Then tag `vX.Y.Z` (matching `version:` in pubspec.yaml) to publish.
name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # required for OIDC token minting
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
