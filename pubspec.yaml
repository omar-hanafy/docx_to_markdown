name: docx_to_markdown
description: >-
  Convert Word .docx (OOXML) files to GitHub-Flavored or CommonMark Markdown in
  pure Dart, with images, tables, lists, footnotes, math, and extensible hooks.
version: 0.0.1
homepage: https://github.com/omar-hanafy/docx_to_markdown
repository: https://github.com/omar-hanafy/docx_to_markdown
issue_tracker: https://github.com/omar-hanafy/docx_to_markdown/issues
documentation: https://github.com/omar-hanafy/docx_to_markdown#readme
example: example

topics:
  - docx
  - markdown
  - ooxml
  - word
  - documents

environment:
  sdk: ^3.12.0

dependencies:
  archive: ^4.0.9
  collection: ^1.19.1
  meta: ^1.18.3
  path: ^1.9.1
  xml: ^7.0.1

dev_dependencies:
  coverage: ^1.11.0
  lints: ^6.1.0
  test: ^1.31.1
